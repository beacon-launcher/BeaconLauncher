name: Release

# Push a version tag (e.g. v0.2.0) → build installers for all three OSes on their
# native runners and publish them to the matching GitHub Release. electron-updater
# in the app reads these to offer in-app updates.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
          - os: macos-latest
            script: build:mac
          - os: ubuntu-latest
            script: build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build & publish installers
        env:
          # Provided automatically by Actions; lets electron-builder upload to the Release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned build — stop electron-builder from hunting for a macOS signing cert.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run ${{ matrix.script }} -- --publish always
