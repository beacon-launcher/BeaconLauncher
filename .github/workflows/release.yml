name: Release

# Two-phase release:
#   1) build — compile installers for each OS on its native runner (no publishing).
#   2) publish — one job downloads every artifact, wipes any stale release for this
#      tag, and uploads them all at once. This avoids electron-builder's flaky
#      concurrent GitHub uploader (the "422 already_exists" asset races).
#
# Push a version tag (e.g. v0.2.0) to trigger.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
          - os: macos-latest
            script: build:mac
          - os: ubuntu-latest
            script: build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build installers
        env:
          # Unsigned build — stop electron-builder hunting for a macOS signing cert.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        # --publish never: build only, the publish job handles uploads.
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: ignore
          retention-days: 5

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # needed to read CHANGELOG.md for the release body

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        # Pull just this version's section (between "## [x.y.z]" and the next "## [") so the
        # GitHub release body is the changelog, not a commit message. Falls back to empty.
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v ver="$VER" '
            $0 ~ ("^## \\[" ver "\\]") { p=1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "Release notes:"; cat RELEASE_NOTES.md

      - name: Delete any previous release for this tag (clean slate)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
            dist/*.blockmap
          fail_on_unmatched_files: false
